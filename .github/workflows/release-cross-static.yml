name: Release Cross Static Builds

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: arm32-le
            zig_targets: arm-linux-musleabi
          - name: arm32-be
            zig_targets: armeb-linux-musleabi,armeb-linux-gnueabi
          - name: aarch64-le
            zig_targets: aarch64-linux-musl
          - name: aarch64-be
            zig_targets: aarch64_be-linux-musl
          - name: mips-le
            zig_targets: mipsel-linux-musl
          - name: mips-be
            zig_targets: mips-linux-musl
          - name: mips64-le
            zig_targets: mips64el-linux-musl,mips64el-linux-gnu
          - name: mips64-be
            zig_targets: mips64-linux-musl,mips64-linux-gnu
          - name: powerpc-le
            zig_targets: powerpc64le-linux-musl,powerpc64le-linux-gnu
          - name: powerpc-be
            zig_targets: powerpc-linux-musl
          - name: x86
            zig_targets: x86-linux-musl,i386-linux-musl
          - name: x86_64
            zig_targets: x86_64-linux-musl

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.14.1

      - name: Build static binaries
        run: |
          set -euo pipefail
          mkdir -p dist/${{ matrix.name }}

          IFS=',' read -ra TARGETS <<< "${{ matrix.zig_targets }}"
          BUILT=0
          for T in "${TARGETS[@]}"; do
            echo "Trying target: ${T}"
            if zig cc -O2 -static -Wno-deprecated-non-prototype -target "${T}" -o dist/${{ matrix.name }}/fw_env_scan-${{ matrix.name }} fw_env_scan.c fw_scan.c \
              && zig cc -O2 -static -Wno-deprecated-non-prototype -target "${T}" -o dist/${{ matrix.name }}/fw_image_scan-${{ matrix.name }} fw_image_scan.c fw_scan.c; then
              echo "Built successfully with target: ${T}"
              BUILT=1
              break
            fi
            echo "Target failed: ${T}"
          done

          if [ "$BUILT" -ne 1 ]; then
            echo "All candidate targets failed for ${{ matrix.name }}"
            exit 1
          fi

      - name: Upload matrix artifact
        uses: actions/upload-artifact@v4
        with:
          name: fw-tools-${{ matrix.name }}
          path: |
            dist/${{ matrix.name }}/fw_env_scan-${{ matrix.name }}
            dist/${{ matrix.name }}/fw_image_scan-${{ matrix.name }}

  publish-release-assets:
    name: Publish release assets
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release'
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/**/fw_env_scan-*
            release-assets/**/fw_image_scan-*
