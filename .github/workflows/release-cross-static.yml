name: Release Cross Static Builds

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: arm32-le
            zig_targets: arm-linux-musleabi
          - name: arm32-be
            zig_targets: armeb-linux-musleabi,armeb-linux-gnueabi
          - name: aarch64-le
            zig_targets: aarch64-linux-musl
          - name: aarch64-be
            zig_targets: aarch64_be-linux-musl
          - name: mips-le
            zig_targets: mipsel-linux-musleabi,mipsel-linux-musleabihf
          - name: mips-be
            zig_targets: mips-linux-musleabi,mips-linux-musleabihf
          - name: mips64-le
            zig_targets: mips64el-linux-muslabi64,mips64el-linux-gnuabi64
          - name: mips64-be
            zig_targets: mips64-linux-muslabi64,mips64-linux-gnuabi64
          - name: powerpc-le
            zig_targets: powerpc64le-linux-musl,powerpc64le-linux-gnu
          - name: powerpc64-be
            zig_targets: powerpc64-linux-musl,powerpc64-linux-gnu
          - name: powerpc-be
            zig_targets: powerpc-linux-musleabi,powerpc-linux-musleabihf,powerpc-linux-gnueabi,powerpc-linux-gnueabihf
          - name: x86
            zig_targets: x86-linux-musl
          - name: x86_64
            zig_targets: x86_64-linux-musl
          - name: riscv32
            zig_targets: riscv32-linux-musl,riscv32-linux-gnu
          - name: riscv64
            zig_targets: riscv64-linux-musl,riscv64-linux-gnu

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.sha }}
          fetch-depth: 0
          submodules: recursive

      - name: Install build tooling for wolfSSL/libssh builds
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y autoconf automake cmake libtool-bin llvm

      - name: Debug selected targets
        run: |
          echo "matrix.name=${{ matrix.name }}"
          echo "matrix.zig_targets=${{ matrix.zig_targets }}"

      - name: Install Zig
        run: |
          set -euo pipefail
          ZIG_VERSION=0.14.0
          curl -fsSL -o zig.tar.xz "https://ziglang.org/download/${ZIG_VERSION}/zig-linux-x86_64-${ZIG_VERSION}.tar.xz"
          tar -xf zig.tar.xz
          echo "$PWD/zig-linux-x86_64-${ZIG_VERSION}" >> "$GITHUB_PATH"
          "$PWD/zig-linux-x86_64-${ZIG_VERSION}/zig" version

      - name: Build default static binary
        run: |
          set -euo pipefail
          export CFLAGS=
          export CPPFLAGS=
          export CXXFLAGS=
          export LDFLAGS=
          test -f agent/embedded_linux_audit.c
          test -f agent/embedded_linux_audit_cmd.h
          test -f third_party/libefivar/src/include/efivar/efivar.h
          test -f third_party/ncurses/configure
          test -f third_party/readline/readline.h
          mkdir -p dist/${{ matrix.name }}

          IFS=',' read -ra TARGETS <<< "${{ matrix.zig_targets }}"
          BUILT=0
          for T in "${TARGETS[@]}"; do
            echo "Trying default target: ${T}"
            if make clean \
               && make static \
                    ELA_USE_READLINE=0 \
                    CMAKE_C_COMPILER="$(command -v zig)" \
                    CMAKE_C_COMPILER_ARG1=cc \
                    CMAKE_C_COMPILER_TARGET="${T}" \
                    CC="zig cc -target ${T}"; then
              cp embedded_linux_audit "dist/${{ matrix.name }}/ela-${{ matrix.name }}"
              if [ "${{ matrix.name }}" = "powerpc-le" ]; then
                cp embedded_linux_audit "dist/${{ matrix.name }}/ela-powerpc64-le"
              fi
              echo "Built default successfully with target: ${T}"
              BUILT=1
              break
            fi
            echo "Default target failed: ${T}"
          done

          if [ "$BUILT" -ne 1 ]; then
            echo "All candidate default targets failed for ${{ matrix.name }}"
            exit 1
          fi

      - name: Upload matrix artifact
        uses: actions/upload-artifact@v4
        with:
          name: ela-${{ matrix.name }}
          path: |
            dist/${{ matrix.name }}/ela-${{ matrix.name }}
            dist/${{ matrix.name }}/ela-powerpc64-le
          if-no-files-found: ignore

  publish-release-assets:
    name: Publish release assets
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release'
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/**/ela-*
