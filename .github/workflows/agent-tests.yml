name: Agent Tests

'on':
  workflow_run:
    workflows:
      - Release Cross Static Builds
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shell-tests:
    name: tests/agent/shell
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          submodules: recursive
          ref: ${{ github.event_name == 'workflow_run' && (github.event.workflow_run.head_branch || github.event.workflow_run.head_sha) || github.sha }}

      - name: Download x86_64 release artifact from triggering workflow
        if: ${{ github.event_name == 'workflow_run' }}
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}
          pattern: ela-x86_64
          path: downloaded-release-binaries

      - name: Stage native agent binary from triggering workflow artifacts
        if: ${{ github.event_name == 'workflow_run' }}
        run: |
          set -euo pipefail
          binary_path="$(find downloaded-release-binaries -type f \( -name 'ela-x86_64' -o -name 'embedded_linux_audit-x86_64' \) | head -n 1)"
          if [ -z "$binary_path" ]; then
            echo "error: unable to locate x86_64 release artifact from triggering workflow" >&2
            exit 1
          fi

          install -m 755 "$binary_path" /tmp/embedded_linux_audit

      - name: Require release artifact for shell tests
        if: ${{ github.event_name != 'workflow_run' }}
        run: |
          set -euo pipefail
          echo "error: shell tests require a triggering Release Cross Static Builds workflow run so the prebuilt x86_64 artifact can be downloaded" >&2
          exit 1

      - name: Run shell tests
        env:
          BIN: /tmp/embedded_linux_audit
        run: |
          set -euo pipefail
          bash tests/agent/shell/test_all.sh

  script-tests:
    name: tests/agent/scripts
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          submodules: recursive
          ref: ${{ github.event_name == 'workflow_run' && (github.event.workflow_run.head_branch || github.event.workflow_run.head_sha) || github.sha }}

      - name: Download x86_64 release artifact from triggering workflow
        if: ${{ github.event_name == 'workflow_run' }}
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}
          pattern: ela-x86_64
          path: downloaded-release-binaries

      - name: Stage native agent binary from triggering workflow artifacts
        if: ${{ github.event_name == 'workflow_run' }}
        run: |
          set -euo pipefail
          binary_path="$(find downloaded-release-binaries -type f \( -name 'ela-x86_64' -o -name 'embedded_linux_audit-x86_64' \) | head -n 1)"
          if [ -z "$binary_path" ]; then
            echo "error: unable to locate x86_64 release artifact from triggering workflow" >&2
            exit 1
          fi

          install -m 755 "$binary_path" /tmp/embedded_linux_audit

      - name: Require release artifact for script tests
        if: ${{ github.event_name != 'workflow_run' }}
        run: |
          set -euo pipefail
          echo "error: script tests require a triggering Release Cross Static Builds workflow run so the prebuilt x86_64 artifact can be downloaded" >&2
          exit 1

      - name: Run script coverage files
        env:
          BIN: /tmp/embedded_linux_audit
        run: |
          set -euo pipefail
          if [ -f tests/agent/scripts/test_all.sh ]; then
            bash tests/agent/scripts/test_all.sh
            exit 0
          fi

          echo "warning: tests/agent/scripts/test_all.sh is not present at this ref; falling back to legacy inline script coverage loop"
          rc=0
          while IFS= read -r script; do
            echo
            echo "===== Running ${script#tests/agent/scripts/} ====="
            if /tmp/embedded_linux_audit --script "$script"; then
              script_rc=0
            else
              script_rc=$?
            fi

            if [ "$script_rc" -eq 2 ]; then
              echo "error: script parser/usage failure for $script"
              rc=1
            fi
          done < <(find tests/agent/scripts -type f -name '*.ela' | sort)
          exit "$rc"

  qemu-tests:
    name: tests/agent/qemu
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          submodules: recursive
          ref: ${{ github.event_name == 'workflow_run' && (github.event.workflow_run.head_branch || github.event.workflow_run.head_sha) || github.sha }}

      - name: Install qemu/runtime dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            bubblewrap \
            qemu-user-static \
            xz-utils

      - name: Install local release build dependencies
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          set -euo pipefail
          sudo apt-get install -y autoconf automake cmake libtool llvm

      - name: Download cross-build artifacts from triggering workflow
        if: ${{ github.event_name == 'workflow_run' }}
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}
          pattern: ela-*
          path: downloaded-release-binaries

      - name: Stage downloaded release binaries for qemu tests
        if: ${{ github.event_name == 'workflow_run' }}
        run: |
          set -euo pipefail
          rm -rf api/data/release_binaries
          mkdir -p api/data/release_binaries

          find downloaded-release-binaries -mindepth 1 -maxdepth 1 -type d | while IFS= read -r artifact_dir; do
            isa="${artifact_dir##*/}"
            isa="${isa#ela-}"
            dest_dir="api/data/release_binaries/${isa}"
            mkdir -p "$dest_dir"

            find "$artifact_dir" -type f \( -name 'ela-*' -o -name 'embedded_linux_audit-*' \) | while IFS= read -r binary; do
              binary_name="$(basename "$binary")"
              case "$binary_name" in
                embedded_linux_audit-*)
                  binary_name="ela-${binary_name#embedded_linux_audit-}"
                  ;;
              esac

              install -m 755 "$binary" "$dest_dir/$binary_name"
            done
          done

      - name: Run qemu ISA tests
        env:
          ELA_QEMU_RUN_AS_ROOT: 1
          ELA_QEMU_REQUIRE_RELEASE_BINARIES: ${{ github.event_name == 'workflow_run' && '1' || '0' }}
        run: |
          set -euo pipefail
          bash tests/agent/qemu/test_all.sh