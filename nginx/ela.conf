# Example nginx reverse-proxy configuration for embedded_linux_audit
#
# Services proxied:
#   /api/agent/    -> api/agent/server.js     (Express, default port 5000)
#   /api/terminal/ -> api/terminal/server.js  (WebSocket, default port 8080)
#
# The terminal endpoint uses WebSocket; nginx must forward the Upgrade header.
# TLS is terminated here; backends communicate over plain HTTP/WS on localhost.
#
# Installation:
#   cp nginx/ela.conf /etc/nginx/sites-available/ela
#   ln -s /etc/nginx/sites-available/ela /etc/nginx/sites-enabled/ela
#   nginx -t && systemctl reload nginx

upstream ela_agent {
    server 127.0.0.1:5000;
    keepalive 16;
}

upstream ela_terminal {
    server 127.0.0.1:8080;
    keepalive 16;
}

# Redirect plain HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name ela.example.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name ela.example.com;

    # --- TLS ------------------------------------------------------------
    ssl_certificate     /etc/ssl/certs/ela.example.com.crt;
    ssl_certificate_key /etc/ssl/private/ela.example.com.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # --- Security headers -----------------------------------------------
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;

    # --- Common proxy settings ------------------------------------------
    proxy_http_version  1.1;
    proxy_set_header    Host              $host;
    proxy_set_header    X-Real-IP         $remote_addr;
    proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header    X-Forwarded-Proto $scheme;
    # Forward the Authorization header so both backends can validate the
    # Bearer token against their ela.key file.
    proxy_set_header    Authorization     $http_authorization;
    proxy_read_timeout  300s;

    # --- Agent API: /api/agent/ -----------------------------------------
    # Strips the /api/agent prefix before forwarding.
    # e.g. GET /api/agent/upload -> http://127.0.0.1:5000/upload
    location /api/agent/ {
        proxy_pass http://ela_agent/;

        # Not a WebSocket endpoint; clear Upgrade just in case
        proxy_set_header Upgrade    "";
        proxy_set_header Connection "";

        client_max_body_size 200m;
    }

    # --- Terminal WebSocket: /api/terminal/ -----------------------------
    # Forwards to the WebSocket server; the agent connects to
    #   wss://ela.example.com/api/terminal/terminal/<mac>
    # which nginx proxies to
    #   ws://127.0.0.1:8080/terminal/<mac>
    location /api/terminal/ {
        proxy_pass http://ela_terminal/;

        # WebSocket upgrade
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Keep idle WebSocket connections alive beyond the default timeout.
        # The agent sends a heartbeat every 30 s so 120 s is a safe margin.
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # --- Default: 404 ---------------------------------------------------
    location / {
        return 404;
    }
}
